<script>

Konekti.uses('header','navbar', 'canvas')

// Función auxiliar para contar cuadros de un color en el tablero
function countSquaresByColor(board, colorValue) {
    let count = 0;
    for (let i = 0; i < board.length; i++) {
        for (let j = 0; j < board.length; j++) {
            if (board[i][j] === colorValue) count++;
        }
    }
    return count;
}

// Guardamos referencia al Environment original para extenderlo
const OriginalEnvironment = Environment;

// Creamos una nueva clase que hereda y modifica el método play para mostrar alert
class PatchedEnvironment extends OriginalEnvironment {
    constructor() {
        super();
        this.alertShown = false; // Evita múltiples alerts
    }

    play() {
        // Llamamos al método original (que ya muestra el ganador en el log)
        // Pero necesitamos interceptar el momento en que se define this.winner
        // Para ello, guardamos una referencia al this y usamos un Proxy o simplemente
        // redefinimos la lógica de finalización. Como no podemos modificar el código interno fácilmente,
        // envolvemos el método original y después de que termine, comprobamos si hay ganador.
        // Sin embargo, el método play original es asíncrono (usa setTimeout). Vamos a reemplazar
        // la función que asigna el ganador para que también muestre el alert.

        // Guardamos el contexto
        const self = this;

        // Sobrescribimos temporalmente la propiedad winner del objeto para detectar cambios
        // Pero mejor: modificamos el código de los callbacks dentro del play original.
        // Como el play original está escrito en Environment, podemos parchear la función compute
        // que se ejecuta recursivamente. Para no romper nada, redefinimos el método play completo
        // copiando la lógica original y añadiendo el alert. Dado que el código original está disponible,
        // lo reescribimos con el añadido.

        // NOTA: El código original del método play está en el ambiente. Lo copiamos y añadimos la alerta.
        // Esto es seguro porque el ambiente no cambia entre ejecuciones.

        const TIME = 10;
        const x = this;
        const board = x.board;
        x.player = 'R';
        Konekti.vc('log').innerHTML = 'The winner is...';
        x.alertShown = false; // Resetear alert para esta partida

        x.init();

        let start = -1;

        function clock() {
            if (x.winner !== '') {
                // Si ya hay ganador, mostramos alert (solo una vez)
                if (!x.alertShown) {
                    x.alertShown = true;
                    // Calcular cuadros finales
                    const finalBoard = x.rb;
                    const redSquares = countSquaresByColor(finalBoard, -1);
                    const yellowSquares = countSquaresByColor(finalBoard, -2);
                    const winnerName = x.winner;
                    alert(`Ganador: ${winnerName}\nCuadros rojos: ${redSquares}\nCuadros amarillos: ${yellowSquares}`);
                }
                return;
            }
            if (start === -1) setTimeout(clock, TIME);
            else {
                const end = Date.now();
                const ellapsed = end - start;
                const remaining = x.ptime[x.player] - ellapsed;
                Konekti.vc(x.player + '_time').innerHTML = remaining;
                Konekti.vc((x.player === 'R' ? 'Y' : 'R') + '_time').innerHTML = x.ptime[x.player === 'R' ? 'Y' : 'R'];

                if (remaining <= 0) {
                    x.winner = (x.player === 'R' ? x.black : x.white) + ' since ' + (x.player === 'R' ? x.white : x.black) + 'got time out';
                }
                setTimeout(clock, TIME);
            }
        }

        function compute() {
            const w = x.player === 'R';
            const id = w ? x.white : x.black;
            const nid = w ? x.black : x.white;
            const b = board.clone(x.rb);
            start = Date.now();
            const action = x.players[id].compute(b, x.ptime[x.player]);
            const end = Date.now();
            const ply = (x.player === 'R') ? -1 : -2;
            const flag = board.move(x.rb, action[0], action[1], action[2], ply);
            if (!flag) {
                x.winner = nid + ' ...Invalid move taken by ' + id + ' on column ' + action;
            } else {
                const winner = board.winner(x.rb);
                if (winner !== ' ') x.winner = winner;
                else {
                    const ellapsed = end - start;
                    x.ptime[x.player] -= ellapsed;
                    Konekti.vc(x.player + '_time').innerHTML = '' + x.ptime[x.player];
                    if (x.ptime[x.player] <= 0) {
                        x.winner = nid + ' since ' + id + ' got run of time';
                    } else {
                        x.player = w ? 'Y' : 'R';
                    }
                }
            }

            board.print(x.rb);
            start = -1;
            if (x.winner === '') setTimeout(compute, TIME);
            else {
                Konekti.vc('log').innerHTML = 'The winner is ' + x.winner;
                // La alerta se mostrará en clock() al detectar winner, pero también podemos mostrarla aquí
                if (!x.alertShown) {
                    x.alertShown = true;
                    const finalBoard = x.rb;
                    const redSquares = countSquaresByColor(finalBoard, -1);
                    const yellowSquares = countSquaresByColor(finalBoard, -2);
                    const winnerName = x.winner;
                    alert(`Ganador: ${winnerName}\nCuadros rojos: ${redSquares}\nCuadros amarillos: ${yellowSquares}`);
                }
            }
        }

        board.print(x.rb);
        setTimeout(clock, 1000);
        setTimeout(compute, 1000);
    }
}

// Reemplazar Environment por la versión parcheada
Environment = PatchedEnvironment;

// Main function using the Konekti infrastructure
function KonektiMain() {
    var client = new Environment();
    client.setPlayers({
        'rand1': new RandomPlayer(),
        'rand2': new RandomPlayer(),
        'AzucarMorena': new AzucarMorena(),
        'AzucarMorenaV2': new AzucarMorenaV2()
    });

    Konekti.header('title', '', 'Squares', 3, {'class': 'w3-black w3-center'});
    Konekti.raw('log', 'The winner is...');
    var btn2 = [
        {'plugin': 'raw', 'setup': ["time", '', {'tag': 'input', 'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'placeholder': "&#xf252; Time (secs)", 'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'raw', 'setup': ["size", '', {'tag': 'input', 'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'placeholder': "&#xf00a; Size", 'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'raw', 'setup': ["R", '', {'tag': 'input', 'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'placeholder': "&#xf111; Red", 'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'raw', 'setup': ["R_time", '&#xf252;  White', {'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'raw', 'setup': ["Y", '', {'tag': 'input', 'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'placeholder': "&#xf10c; Yellow", 'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'raw', 'setup': ["Y_time", '&#xf252; Yellow', {'width': '150px', 'class': "w3-bar-item w3-input w3-border w3-round-xlarge",
                'style': "margin-top:2px;margin-bottom:2px;font-family: FontAwesome, Arial, Verdana, sans-serif;"}]},
        {'plugin': 'btn', 'setup': ["play", "fa-play", '', null, {'title': 'Cara', 'class': 'w3-right'}]}
    ];
    Konekti.navbar('navbar2', btn2, {'client': 'client', 'method': 'play'}, {'class': 'w3-black w3-medium'});
    var commands = custom_commands();
    Konekti.canvas('canvas', {}, commands, {'width': '100%', 'height': 'fit'});
}

</script>
